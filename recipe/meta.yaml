{% set name = "etils" %}
{% set version = "1.14.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/google/etils/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 99d6d2992b1a256bd921ae210dd9f00e6a100428edb71d15d8ce05fb70ba3fd1

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  skip: true  # [py<311]

requirements:
  host:
    - pip
    - python
    - flit-core >=3.8,<4
  run:
    - python

test:
  imports:
    - etils
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://etils.readthedocs.io
  summary: Collection of common python utils
  description: etils (eclectic utils) is an open-source collection of utils for python.
  license: Apache-2.0
  license_file: LICENSE
  license_family: Apache
  doc_url: https://etils.readthedocs.io
  dev_url: https://github.com/google/etils

extra:
  recipe-maintainers:
    - ngam
    - traversaro
